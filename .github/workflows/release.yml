# Release builds: macOS (arm64), Linux (x86_64), Windows (x86_64).
#
# Triggered by pushing a tag like `v0.1.0` (attaches binaries to a GitHub
# release for that tag) or manually via workflow_dispatch (artifacts only).
#
# Requirements / assumptions:
#   * The zigui UI library is available at <same owner>/zigui — build.zig takes
#     its path via -Dzigui. If the repo name or ref differs, adjust the
#     "Check out zigui" steps.
#   * deps/ submodules are public upstreams (cloned recursively here); the two
#     local Metal patches needed for video-on-Metal live in deps/patches/ and
#     are applied after checkout.
#   * SDL3 is pinned below (same minor as local dev: 3.4.x — the tray API
#     needs >= 3.4). macOS: Homebrew. Linux: built from source (shared lib
#     bundled next to the binary; the rpath is $ORIGIN). Windows: the upstream
#     prebuilt VC devel package (SDL3.dll zipped next to the exe).
#
# Linux/Windows build the C++ deps as SHARED libraries with ggml's dynamic
# backend loader (GGML_BACKEND_DL): the CPU, Vulkan and CUDA backends become
# loadable modules bundled next to the binary, and ggml picks the best available
# device at runtime (CUDA → Vulkan → CPU). This lets the CUDA backend be compiled
# with the native toolchain (nvcc + gcc/MSVC — nvcc cannot use zig cc as host),
# while the zig exe links everything over ggml's C ABI. The deps therefore build
# with the native compiler (gcc on Linux, MSVC on Windows), NOT `zig cc`.
#
# NOTE: GitHub-hosted runners have no NVIDIA GPU, so the CUDA backend is BUILT and
# packaged here but cannot be functionally run-tested in CI (same limitation as
# upstream llama.cpp). Verify CUDA execution on real NVIDIA hardware.

name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

env:
  ZIG_VERSION: 0.16.0
  SDL_REF: release-3.4.10
  # zigui release the app builds against (https://github.com/ddalcu/zigui).
  ZIGUI_REF: v0.3.2
  # ccache speeds up the (slow, multi-arch CUDA) deps compile across runs. The
  # deps' CMake already wires ccache as the compiler launcher (ggml's
  # GGML_CCACHE), so installing ccache + caching this dir is all that's needed.
  CCACHE_DIR: ${{ github.workspace }}/.ccache
  CCACHE_MAXSIZE: 2G

jobs:
  build-macos:
    runs-on: macos-latest # arm64
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Check out zigui
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/zigui
          ref: ${{ env.ZIGUI_REF }}
          path: zigui-src

      - name: Apply local submodule patches
        run: |
          git -C deps/llama.cpp apply ../patches/llama.cpp-metal-left-pad.patch
          git -C deps/stable-diffusion.cpp apply ../patches/stable-diffusion.cpp-conv3d-direct.patch
          git -C deps/qwen3-tts.cpp apply ../patches/qwen3-tts.cpp-win-portability.patch

      - uses: mlugg/setup-zig@v2
        with:
          version: ${{ env.ZIG_VERSION }}

      - name: Install build deps
        run: brew install ninja sdl3 ccache

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.ccache
          key: ccache-${{ runner.os }}-${{ github.run_id }}
          restore-keys: ccache-${{ runner.os }}-

      - name: Build
        run: zig build -Doptimize=ReleaseFast -Dzigui=zigui-src

      - name: Package
        run: |
          mkdir dist
          cp zig-out/bin/zig-ai dist/
          SDL_PREFIX="$(brew --prefix sdl3)"
          cp "$SDL_PREFIX"/lib/libSDL3.*.dylib dist/
          # The binary records the Homebrew keg path for SDL3; rewrite it to
          # @rpath so the bundled dylib (rpath @executable_path) is found on
          # machines without Homebrew. Re-sign (ad-hoc): editing the load
          # command invalidates the signature, and unsigned arm64 won't run.
          SDL_REF_PATH=$(otool -L dist/zig-ai | awk '/libSDL3/{print $1}')
          SDL_BASENAME=$(basename "$SDL_REF_PATH")
          install_name_tool -change "$SDL_REF_PATH" "@rpath/$SDL_BASENAME" dist/zig-ai
          codesign --force --sign - dist/zig-ai
          tar -czf zig-ai-macos-arm64.tar.gz -C dist .

      - uses: actions/upload-artifact@v4
        with:
          name: zig-ai-macos-arm64
          path: zig-ai-macos-arm64.tar.gz

  build-linux:
    runs-on: ubuntu-latest # x86_64
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Check out zigui
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/zigui
          ref: ${{ env.ZIGUI_REF }}
          path: zigui-src

      - name: Apply local submodule patches
        run: |
          git -C deps/llama.cpp apply ../patches/llama.cpp-metal-left-pad.patch
          git -C deps/stable-diffusion.cpp apply ../patches/stable-diffusion.cpp-conv3d-direct.patch
          git -C deps/qwen3-tts.cpp apply ../patches/qwen3-tts.cpp-win-portability.patch

      - uses: mlugg/setup-zig@v2
        with:
          version: ${{ env.ZIG_VERSION }}

      - name: Install build deps
        run: |
          sudo apt-get update
          # ninja + the X11/Wayland/audio/dbus dev headers SDL3 builds against
          # (dbus is what the tray uses on Linux; udev for input hotplug).
          sudo apt-get install -y ninja-build build-essential \
            libx11-dev libxext-dev libxrandr-dev libxcursor-dev libxi-dev \
            libxfixes-dev libxtst-dev libxss-dev libwayland-dev libxkbcommon-dev \
            libegl1-mesa-dev libgl1-mesa-dev libdrm-dev libgbm-dev \
            libasound2-dev libpulse-dev libpipewire-0.3-dev \
            libdbus-1-dev libudev-dev libusb-1.0-0-dev \
            libvulkan-dev glslc glslang-tools spirv-headers ccache

      - name: Install CUDA Toolkit
        # The ggml CUDA backend is built with nvcc (host compiler = gcc, which
        # build-essential provides). It ships as a loadable ggml backend module
        # bundled next to the binary; ggml loads it at runtime when an NVIDIA GPU
        # is present and falls back to Vulkan/CPU otherwise. Bump the version as
        # newer CUDA toolkits land. (Hosted runners have no GPU, so this BUILDS
        # but cannot run-test CUDA — like upstream llama.cpp's CUDA CI.)
        uses: Jimver/cuda-toolkit@v0.2.35
        id: cuda-toolkit
        with:
          cuda: '13.2.0'
          linux-local-args: '["--toolkit"]'

      - name: Cache SDL3
        id: cache-sdl3
        uses: actions/cache@v4
        with:
          path: sdl3-prefix
          key: sdl3-${{ env.SDL_REF }}-${{ runner.os }}

      - name: Build SDL3
        if: steps.cache-sdl3.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 --branch "$SDL_REF" https://github.com/libsdl-org/SDL sdl3-src
          cmake -S sdl3-src -B sdl3-build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX="$PWD/sdl3-prefix" \
            -DSDL_TESTS=OFF -DSDL_EXAMPLES=OFF
          cmake --build sdl3-build -j
          cmake --install sdl3-build

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.ccache
          key: ccache-${{ runner.os }}-${{ github.run_id }}
          restore-keys: ccache-${{ runner.os }}-

      - name: Build
        # Shared-library build with dynamic ggml backends (GGML_BACKEND_DL): the
        # deps compile natively with gcc (which is also nvcc's CUDA host) into
        # .so libraries the zig exe links over their C ABI. The CPU/Vulkan/CUDA
        # backends are separate modules ggml loads at runtime. -Dcuda builds the
        # CUDA module; the arch list is constrained (Turing..Blackwell) to match
        # the Windows job and keep the multi-arch CUDA compile from taking ~1h
        # (ccache makes repeat runs far faster).
        run: zig build -Doptimize=ReleaseFast -Dzigui=zigui-src -Dsdl3=sdl3-prefix -Dcuda=true -Dcuda-arch="75-real;80-real;86-real;89-real;90-real;120-real;120-virtual"

      - name: Package
        # Split into a small base bundle and an optional CUDA add-on. The CUDA
        # runtime (esp. libcublasLt, ~0.5 GB) dwarfs everything else, and most
        # users don't need it — NVIDIA cards still accelerate via Vulkan in the
        # base. Because ggml loads backend modules from the binary's directory at
        # runtime, the add-on is literally "extract these files next to the
        # binary" with no separate install. Each asset stays well under GitHub's
        # 2 GiB/file release limit; the add-on uses xz -9 (cublasLt is code and
        # compresses ~2x).
        run: |
          mkdir base cuda
          cp zig-out/bin/zig-ai base/
          # ggml backend modules: the CUDA one goes in the add-on, the rest (cpu,
          # vulkan, core ggml, llama/sd/tts) in the base. The .so live in bin/
          # (llama.cpp forces LIBRARY_OUTPUT=bin) or lib/, so scan both.
          for f in build-deps/lib/*.so* build-deps/bin/*.so*; do
            [ -e "$f" ] || continue
            case "$(basename "$f")" in
              *ggml-cuda*) cp -P "$f" cuda/ ;;
              *)           cp -P "$f" base/ ;;
            esac
          done
          cp -P sdl3-prefix/lib/libSDL3.so.0* base/
          cp /usr/lib/x86_64-linux-gnu/libvulkan.so.1* base/
          # NVIDIA runtime -> add-on so the CUDA module loads without the toolkit.
          for lib in libcudart libcublas libcublasLt; do
            find "${CUDA_PATH:-/usr/local/cuda}/lib64" -name "${lib}.so*" -exec cp -P {} cuda/ \; 2>/dev/null || true
          done
          tar -czf zig-ai-linux-x86_64.tar.gz -C base .
          tar -cJf zig-ai-linux-x86_64-cuda.tar.xz -C cuda .
          ls -la zig-ai-linux-x86_64*.tar.*

      - name: Build AppImage
        # Wrap the base bundle (binary + co-located .so) as a single
        # double-clickable AppImage. No app changes needed: the exe's $ORIGIN rpath
        # already finds the bundled libs, and AppImage runs UNSANDBOXED, so the
        # system tray, the local HTTP server and the terminal-based agent launcher
        # all behave exactly as in the tarball. NVIDIA users are covered via Vulkan
        # here; the separate -cuda.tar.xz add-on remains the max-performance path
        # (its "drop the .so next to the binary" model can't live in a read-only
        # AppImage mount, so CUDA is intentionally tarball-only).
        run: |
          # AppDir layout: AppRun -> usr/bin/zig-ai, with every bundled lib sitting
          # next to the binary (cp -P preserves the versioned .so symlinks).
          mkdir -p AppDir/usr/bin
          cp -P base/* AppDir/usr/bin/
          # Root icon becomes the AppImage thumbnail (.DirIcon); the hicolor copy is
          # for menu integration once installed. Source icon is 751x753, so resize
          # the menu copy to a standard 256x256 when ImageMagick is available.
          cp assets/icon.png AppDir/zig-ai.png
          mkdir -p AppDir/usr/share/icons/hicolor/256x256/apps
          if command -v convert >/dev/null 2>&1; then
            convert assets/icon.png -resize 256x256 AppDir/usr/share/icons/hicolor/256x256/apps/zig-ai.png
          else
            cp assets/icon.png AppDir/usr/share/icons/hicolor/256x256/apps/zig-ai.png
          fi
          cat > AppDir/zig-ai.desktop <<'EOF'
          [Desktop Entry]
          Type=Application
          Name=Zig AI
          Comment=In-process local AI desktop app
          Exec=zig-ai
          Icon=zig-ai
          Categories=Utility;
          Terminal=false
          EOF
          install -Dm644 AppDir/zig-ai.desktop AppDir/usr/share/applications/zig-ai.desktop
          cat > AppDir/AppRun <<'EOF'
          #!/bin/sh
          HERE="$(dirname "$(readlink -f "$0")")"
          exec "$HERE/usr/bin/zig-ai" "$@"
          EOF
          chmod +x AppDir/AppRun
          # appimagetool is itself an AppImage; the runner has no FUSE, so run it in
          # extract-and-run mode. ARCH is required because the AppDir carries no
          # embedded arch hint.
          curl -fsSL -o appimagetool \
            https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool
          export APPIMAGE_EXTRACT_AND_RUN=1 ARCH=x86_64
          ./appimagetool AppDir zig-ai-linux-x86_64.AppImage
          ls -la zig-ai-linux-x86_64.AppImage

      - uses: actions/upload-artifact@v4
        with:
          name: zig-ai-linux-x86_64
          path: |
            zig-ai-linux-x86_64.tar.gz
            zig-ai-linux-x86_64-cuda.tar.xz
            zig-ai-linux-x86_64.AppImage

  build-windows:
    runs-on: windows-latest # x86_64
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Check out zigui
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/zigui
          ref: ${{ env.ZIGUI_REF }}
          path: zigui-src

      - name: Apply local submodule patches
        shell: bash
        run: |
          git -C deps/llama.cpp apply ../patches/llama.cpp-metal-left-pad.patch
          git -C deps/stable-diffusion.cpp apply ../patches/stable-diffusion.cpp-conv3d-direct.patch
          git -C deps/qwen3-tts.cpp apply ../patches/qwen3-tts.cpp-win-portability.patch

      - uses: mlugg/setup-zig@v2
        with:
          version: ${{ env.ZIG_VERSION }}

      - name: Install ninja + ccache
        run: choco install -y ninja ccache

      - name: Set up MSVC (cl.exe) environment
        # The C++ deps now build natively with MSVC (and nvcc for the CUDA module
        # — nvcc's host compiler on Windows must be MSVC, not zig cc). This sets
        # cl.exe / INCLUDE / LIB for every later step, so the CMake invoked by
        # `zig build` finds them. The zig exe itself is still built by zig
        # (windows-gnu) and links the resulting DLLs over their C ABI.
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Install Vulkan SDK
        uses: jakoch/install-vulkan-sdk-action@v1.5.5
        with:
          cache: true
          stripdown: true

      - name: Install CUDA Toolkit
        # Builds the ggml CUDA backend module (nvcc + MSVC host). Bundled next to
        # the exe and loaded at runtime when an NVIDIA GPU is present; otherwise
        # ggml falls back to Vulkan/CPU. Hosted runners have no GPU, so this
        # BUILDS but cannot run-test CUDA. Heavy: multi-arch CUDA compiles are
        # slow — bump the version as newer toolkits land.
        uses: Jimver/cuda-toolkit@v0.2.35
        id: cuda-toolkit
        with:
          cuda: '13.2.0'
          # Full (local) install: the runner ships Visual Studio 18, which only
          # CUDA 13.x supports, and 13.x's network sub-packages omit the CRT
          # headers (crt/host_config.h) that nvcc/CMake need. A local install
          # bundles everything (cached between runs).
          method: 'local'

      - name: Fetch SDL3 (prebuilt mingw devel package)
        shell: bash
        # The mingw package matches the windows-gnu/zig toolchain (gnu import
        # lib) and already has the include/ + lib/ prefix layout -Dsdl3 wants.
        run: |
          VER="${SDL_REF#release-}"
          curl -fsSL -o sdl3.zip \
            "https://github.com/libsdl-org/SDL/releases/download/${SDL_REF}/SDL3-devel-${VER}-mingw.zip"
          unzip -q sdl3.zip
          cp -r "SDL3-${VER}/x86_64-w64-mingw32" sdl3-prefix
          # zig probes SDL3.dll / SDL3.lib / libSDL3.a but not the mingw
          # import-lib name libSDL3.dll.a — expose it as SDL3.lib (lld links
          # gnu import libraries fine regardless of extension).
          cp sdl3-prefix/lib/libSDL3.dll.a sdl3-prefix/lib/SDL3.lib

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.ccache
          key: ccache-${{ runner.os }}-${{ github.run_id }}
          restore-keys: ccache-${{ runner.os }}-

      - name: Build C++ deps
        shell: bash
        # Separate step so CMake's configure (MSVC + CUDA detection) and the DLL
        # names it produced are visible in the log. CC/CXX are NOT set: CMake
        # auto-detects cl.exe from the MSVC environment above and nvcc for CUDA.
        run: |
          zig build deps -Dtarget=x86_64-windows-gnu "-Dvulkan-prefix=$VULKAN_SDK" -Dcuda=true -Dcuda-arch="75-real;80-real;86-real;89-real;90-real;120-real;120-virtual"
          ls -la build-deps/bin

      - name: Build
        shell: bash
        run: zig build -Doptimize=ReleaseFast -Dtarget=x86_64-windows-gnu -Dzigui=zigui-src -Dsdl3=sdl3-prefix "-Dvulkan-prefix=$VULKAN_SDK" -Dcuda=true -Dcuda-arch="75-real;80-real;86-real;89-real;90-real;120-real;120-virtual"

      - name: Package
        shell: bash
        # Split into a small base bundle and an optional CUDA add-on. The CUDA
        # runtime (esp. cublasLt64, ~0.5 GB) dwarfs everything else and most
        # users don't need it — NVIDIA cards still accelerate via Vulkan in the
        # base. ggml loads backend modules from the exe's directory at runtime,
        # so the add-on is just "extract these DLLs next to zig-ai.exe". Each zip
        # stays well under GitHub's 2 GiB/file release limit; the add-on uses
        # 7z -mx=9 (cublasLt is code and compresses ~2x).
        run: |
          mkdir base cuda
          cp zig-out/bin/zig-ai.exe base/
          cp sdl3-prefix/bin/SDL3.dll base/
          # ggml backend modules: CUDA one -> add-on, the rest (cpu, vulkan, core
          # ggml, llama/sd/tts) -> base.
          for f in build-deps/bin/*.dll; do
            case "$(basename "$f")" in
              ggml-cuda*) cp "$f" cuda/ ;;
              *)          cp "$f" base/ ;;
            esac
          done
          # NVIDIA runtime redistributables -> add-on (CUDA 12.x: bin/, 13.x: bin/x64/).
          for dir in "$CUDA_PATH/bin" "$CUDA_PATH/bin/x64"; do
            for pat in cudart64_ cublas64_ cublasLt64_; do
              find "$dir" -name "${pat}*.dll" -exec cp {} cuda/ \; 2>/dev/null || true
            done
          done
          (cd base && 7z a ../zig-ai-windows-x86_64.zip .)
          (cd cuda && 7z a -mx=9 ../zig-ai-windows-x86_64-cuda.zip .)
          ls -la zig-ai-windows-x86_64*.zip

      - uses: actions/upload-artifact@v4
        with:
          name: zig-ai-windows-x86_64
          path: |
            zig-ai-windows-x86_64.zip
            zig-ai-windows-x86_64-cuda.zip

  release:
    if: ${{ startsWith(github.ref, 'refs/tags/') }}
    needs: [build-macos, build-linux, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
          append_body: true
          body: |
            ### Linux
            Two equivalent base downloads: the `.tar.gz` (extract and run `zig-ai`)
            or the single double-clickable `.AppImage` (`chmod +x` then run). Both
            ship the same CPU + Vulkan build; pick whichever you prefer.

            ### NVIDIA CUDA (optional)
            The base download runs on CPU and any GPU via Vulkan (including NVIDIA).
            For maximum performance on an NVIDIA GPU, also download the matching
            `*-cuda` add-on and extract it **into the same folder** as the app
            (next to `zig-ai` / `zig-ai.exe`). ggml then loads the CUDA backend
            automatically and falls back to Vulkan/CPU if it's absent. macOS uses
            Metal and needs no add-on.
