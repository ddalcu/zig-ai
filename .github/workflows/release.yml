# Release builds: macOS (arm64), Linux (x86_64), Windows (x86_64).
#
# Triggered by pushing a tag like `v0.1.0` (attaches binaries to a GitHub
# release for that tag) or manually via workflow_dispatch (artifacts only).
#
# Requirements / assumptions:
#   * The zigui UI library is available at <same owner>/zigui — build.zig takes
#     its path via -Dzigui. If the repo name or ref differs, adjust the
#     "Check out zigui" steps.
#   * deps/ submodules are public upstreams (cloned recursively here); the two
#     local Metal patches needed for video-on-Metal live in deps/patches/ and
#     are applied after checkout.
#   * SDL3 is pinned below (same minor as local dev: 3.4.x — the tray API
#     needs >= 3.4). macOS: Homebrew. Linux: built from source (shared lib
#     bundled next to the binary; the rpath is $ORIGIN). Windows: the upstream
#     prebuilt VC devel package (SDL3.dll zipped next to the exe).
#
# Linux/Windows build the C++ deps as SHARED libraries with ggml's dynamic
# backend loader (GGML_BACKEND_DL): the CPU, Vulkan and CUDA backends become
# loadable modules bundled next to the binary, and ggml picks the best available
# device at runtime (CUDA → Vulkan → CPU). This lets the CUDA backend be compiled
# with the native toolchain (nvcc + gcc/MSVC — nvcc cannot use zig cc as host),
# while the zig exe links everything over ggml's C ABI. The deps therefore build
# with the native compiler (gcc on Linux, MSVC on Windows), NOT `zig cc`.
#
# NOTE: GitHub-hosted runners have no NVIDIA GPU, so the CUDA backend is BUILT and
# packaged here but cannot be functionally run-tested in CI (same limitation as
# upstream llama.cpp). Verify CUDA execution on real NVIDIA hardware.

name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

env:
  ZIG_VERSION: 0.16.0
  SDL_REF: release-3.4.10
  # zigui release the app builds against (https://github.com/ddalcu/zigui).
  ZIGUI_REF: v0.3.0

jobs:
  build-macos:
    runs-on: macos-latest # arm64
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Check out zigui
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/zigui
          ref: ${{ env.ZIGUI_REF }}
          path: zigui-src

      - name: Apply local submodule patches
        run: |
          git -C deps/llama.cpp apply ../patches/llama.cpp-metal-left-pad.patch
          git -C deps/stable-diffusion.cpp apply ../patches/stable-diffusion.cpp-conv3d-direct.patch
          git -C deps/qwen3-tts.cpp apply ../patches/qwen3-tts.cpp-win-portability.patch

      - uses: mlugg/setup-zig@v2
        with:
          version: ${{ env.ZIG_VERSION }}

      - name: Install build deps
        run: brew install ninja sdl3

      - name: Build
        run: zig build -Doptimize=ReleaseFast -Dzigui=zigui-src

      - name: Package
        run: |
          mkdir dist
          cp zig-out/bin/zig-ai dist/
          SDL_PREFIX="$(brew --prefix sdl3)"
          cp "$SDL_PREFIX"/lib/libSDL3.*.dylib dist/
          # The binary records the Homebrew keg path for SDL3; rewrite it to
          # @rpath so the bundled dylib (rpath @executable_path) is found on
          # machines without Homebrew. Re-sign (ad-hoc): editing the load
          # command invalidates the signature, and unsigned arm64 won't run.
          SDL_REF_PATH=$(otool -L dist/zig-ai | awk '/libSDL3/{print $1}')
          SDL_BASENAME=$(basename "$SDL_REF_PATH")
          install_name_tool -change "$SDL_REF_PATH" "@rpath/$SDL_BASENAME" dist/zig-ai
          codesign --force --sign - dist/zig-ai
          tar -czf zig-ai-macos-arm64.tar.gz -C dist .

      - uses: actions/upload-artifact@v4
        with:
          name: zig-ai-macos-arm64
          path: zig-ai-macos-arm64.tar.gz

  build-linux:
    runs-on: ubuntu-latest # x86_64
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Check out zigui
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/zigui
          ref: ${{ env.ZIGUI_REF }}
          path: zigui-src

      - name: Apply local submodule patches
        run: |
          git -C deps/llama.cpp apply ../patches/llama.cpp-metal-left-pad.patch
          git -C deps/stable-diffusion.cpp apply ../patches/stable-diffusion.cpp-conv3d-direct.patch
          git -C deps/qwen3-tts.cpp apply ../patches/qwen3-tts.cpp-win-portability.patch

      - uses: mlugg/setup-zig@v2
        with:
          version: ${{ env.ZIG_VERSION }}

      - name: Install build deps
        run: |
          sudo apt-get update
          # ninja + the X11/Wayland/audio/dbus dev headers SDL3 builds against
          # (dbus is what the tray uses on Linux; udev for input hotplug).
          sudo apt-get install -y ninja-build build-essential \
            libx11-dev libxext-dev libxrandr-dev libxcursor-dev libxi-dev \
            libxfixes-dev libxtst-dev libxss-dev libwayland-dev libxkbcommon-dev \
            libegl1-mesa-dev libgl1-mesa-dev libdrm-dev libgbm-dev \
            libasound2-dev libpulse-dev libpipewire-0.3-dev \
            libdbus-1-dev libudev-dev libusb-1.0-0-dev \
            libvulkan-dev glslc glslang-tools spirv-headers

      - name: Install CUDA Toolkit
        # The ggml CUDA backend is built with nvcc (host compiler = gcc, which
        # build-essential provides). It ships as a loadable ggml backend module
        # bundled next to the binary; ggml loads it at runtime when an NVIDIA GPU
        # is present and falls back to Vulkan/CPU otherwise. Bump the version as
        # newer CUDA toolkits land. (Hosted runners have no GPU, so this BUILDS
        # but cannot run-test CUDA — like upstream llama.cpp's CUDA CI.)
        uses: Jimver/cuda-toolkit@v0.2.24
        id: cuda-toolkit
        with:
          cuda: '13.2.0'
          linux-local-args: '["--toolkit"]'

      - name: Cache SDL3
        id: cache-sdl3
        uses: actions/cache@v4
        with:
          path: sdl3-prefix
          key: sdl3-${{ env.SDL_REF }}-${{ runner.os }}

      - name: Build SDL3
        if: steps.cache-sdl3.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 --branch "$SDL_REF" https://github.com/libsdl-org/SDL sdl3-src
          cmake -S sdl3-src -B sdl3-build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX="$PWD/sdl3-prefix" \
            -DSDL_TESTS=OFF -DSDL_EXAMPLES=OFF
          cmake --build sdl3-build -j
          cmake --install sdl3-build

      - name: Build
        # Shared-library build with dynamic ggml backends (GGML_BACKEND_DL): the
        # deps compile natively with gcc (which is also nvcc's CUDA host) into
        # .so libraries the zig exe links over their C ABI. The CPU/Vulkan/CUDA
        # backends are separate modules ggml loads at runtime. -Dcuda builds the
        # CUDA module; -Dcuda-arch is left at ggml's portable default (the runner
        # has no GPU, so "native" is not an option here).
        run: zig build -Doptimize=ReleaseFast -Dzigui=zigui-src -Dsdl3=sdl3-prefix -Dcuda=true

      - name: Package
        run: |
          mkdir dist
          cp zig-out/bin/zig-ai dist/
          # Bundle every shared lib next to the binary (rpath is $ORIGIN): the AI
          # libs + ggml core + the ggml backend modules (cpu/vulkan/cuda). ggml
          # scans this dir at runtime and picks the best device, falling back
          # CUDA → Vulkan → CPU when a GPU/driver/ICD is absent.
          cp -P build-deps/lib/*.so* dist/
          cp sdl3-prefix/lib/libSDL3.so.0* dist/
          cp /usr/lib/x86_64-linux-gnu/libvulkan.so.1* dist/
          # CUDA runtime so the CUDA module loads without the full toolkit present.
          for lib in libcudart libcublas libcublasLt; do
            find "${CUDA_PATH:-/usr/local/cuda}/lib64" -name "${lib}.so*" -exec cp -P {} dist/ \; 2>/dev/null || true
          done
          tar -czf zig-ai-linux-x86_64.tar.gz -C dist .

      - uses: actions/upload-artifact@v4
        with:
          name: zig-ai-linux-x86_64
          path: zig-ai-linux-x86_64.tar.gz

  build-windows:
    runs-on: windows-latest # x86_64
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Check out zigui
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/zigui
          ref: ${{ env.ZIGUI_REF }}
          path: zigui-src

      - name: Apply local submodule patches
        shell: bash
        run: |
          git -C deps/llama.cpp apply ../patches/llama.cpp-metal-left-pad.patch
          git -C deps/stable-diffusion.cpp apply ../patches/stable-diffusion.cpp-conv3d-direct.patch
          git -C deps/qwen3-tts.cpp apply ../patches/qwen3-tts.cpp-win-portability.patch

      - uses: mlugg/setup-zig@v2
        with:
          version: ${{ env.ZIG_VERSION }}

      - name: Install ninja
        run: choco install -y ninja

      - name: Set up MSVC (cl.exe) environment
        # The C++ deps now build natively with MSVC (and nvcc for the CUDA module
        # — nvcc's host compiler on Windows must be MSVC, not zig cc). This sets
        # cl.exe / INCLUDE / LIB for every later step, so the CMake invoked by
        # `zig build` finds them. The zig exe itself is still built by zig
        # (windows-gnu) and links the resulting DLLs over their C ABI.
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Install Vulkan SDK
        uses: jakoch/install-vulkan-sdk-action@v1.5.5
        with:
          cache: true
          stripdown: true

      - name: Install CUDA Toolkit
        # Builds the ggml CUDA backend module (nvcc + MSVC host). Bundled next to
        # the exe and loaded at runtime when an NVIDIA GPU is present; otherwise
        # ggml falls back to Vulkan/CPU. Hosted runners have no GPU, so this
        # BUILDS but cannot run-test CUDA. Heavy: multi-arch CUDA compiles are
        # slow — bump the version as newer toolkits land.
        uses: Jimver/cuda-toolkit@v0.2.24
        id: cuda-toolkit
        with:
          cuda: '13.2.0'
          sub-packages: '["nvcc", "cudart", "cublas", "cublas_dev", "thrust", "visual_studio_integration"]'
          method: 'network'

      - name: Fetch SDL3 (prebuilt mingw devel package)
        shell: bash
        # The mingw package matches the windows-gnu/zig toolchain (gnu import
        # lib) and already has the include/ + lib/ prefix layout -Dsdl3 wants.
        run: |
          VER="${SDL_REF#release-}"
          curl -fsSL -o sdl3.zip \
            "https://github.com/libsdl-org/SDL/releases/download/${SDL_REF}/SDL3-devel-${VER}-mingw.zip"
          unzip -q sdl3.zip
          cp -r "SDL3-${VER}/x86_64-w64-mingw32" sdl3-prefix
          # zig probes SDL3.dll / SDL3.lib / libSDL3.a but not the mingw
          # import-lib name libSDL3.dll.a — expose it as SDL3.lib (lld links
          # gnu import libraries fine regardless of extension).
          cp sdl3-prefix/lib/libSDL3.dll.a sdl3-prefix/lib/SDL3.lib

      - name: Build C++ deps
        shell: bash
        # Separate step so CMake's configure (MSVC + CUDA detection) and the DLL
        # names it produced are visible in the log. CC/CXX are NOT set: CMake
        # auto-detects cl.exe from the MSVC environment above and nvcc for CUDA.
        run: |
          zig build deps -Dtarget=x86_64-windows-gnu "-Dvulkan-prefix=$VULKAN_SDK" -Dcuda=true -Dcuda-arch="75-real;80-real;86-real;89-real;90-real;120-real;120-virtual"
          ls -la build-deps/bin

      - name: Build
        shell: bash
        run: zig build -Doptimize=ReleaseFast -Dtarget=x86_64-windows-gnu -Dzigui=zigui-src -Dsdl3=sdl3-prefix "-Dvulkan-prefix=$VULKAN_SDK" -Dcuda=true -Dcuda-arch="75-real;80-real;86-real;89-real;90-real;120-real;120-virtual"

      - name: Package
        shell: bash
        run: |
          mkdir dist
          cp zig-out/bin/zig-ai.exe dist/
          cp sdl3-prefix/bin/SDL3.dll dist/
          # All AI shared libs + ggml core + the ggml backend modules
          # (ggml-cpu/-vulkan/-cuda DLLs). ggml loads the modules from the exe's
          # directory at runtime and selects the best device (CUDA→Vulkan→CPU).
          cp build-deps/bin/*.dll dist/
          # CUDA runtime redistributables so the CUDA module loads without the
          # full toolkit installed on the user's machine. CUDA 12.x keeps these
          # in bin/, CUDA 13.x in bin/x64/ — search both.
          for dir in "$CUDA_PATH/bin" "$CUDA_PATH/bin/x64"; do
            for pat in cudart64_ cublas64_ cublasLt64_; do
              find "$dir" -name "${pat}*.dll" -exec cp {} dist/ \; 2>/dev/null || true
            done
          done
          cd dist && 7z a ../zig-ai-windows-x86_64.zip .

      - uses: actions/upload-artifact@v4
        with:
          name: zig-ai-windows-x86_64
          path: zig-ai-windows-x86_64.zip

  release:
    if: ${{ startsWith(github.ref, 'refs/tags/') }}
    needs: [build-macos, build-linux, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
